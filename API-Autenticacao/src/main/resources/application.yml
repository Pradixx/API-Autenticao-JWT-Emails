server:
  port: 8080

# ===== Banco de Dados =====
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ===== E-mail (SMTP) =====
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ===== Configurações da Aplicação =====
application:
  url: ${APP_URL:http://localhost:8080}

  # ===== JWT =====
  # O segredo deve ter no mínimo 32 caracteres (256 bits) para HMAC-SHA256
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000          # 24 horas em milissegundos
    verification-token-expiration: 86400000  # 24 horas em milissegundos
